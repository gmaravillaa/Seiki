{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner - Attendance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .header p {
      color: #999;
      font-size: 14px;
    }

    .scanner-wrapper {
      position: relative;
      margin: 30px 0;
      border-radius: 15px;
      overflow: hidden;
      background: #f8f9fa;
    }

    #preview {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #000;
      border-radius: 15px;
    }

    .scanner-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      transform: translate(-50%, -50%);
      border: 3px dashed rgba(255, 255, 255, 0.5);
      border-radius: 10px;
      pointer-events: none;
      display: none;
    }

    .scanner-frame.active {
      display: block;
    }

    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 3px solid #667eea;
    }

    .corner.top-left {
      top: 0;
      left: 0;
      border-right: none;
      border-bottom: none;
    }

    .corner.top-right {
      top: 0;
      right: 0;
      border-left: none;
      border-bottom: none;
    }

    .corner.bottom-left {
      bottom: 0;
      left: 0;
      border-right: none;
      border-top: none;
    }

    .corner.bottom-right {
      bottom: 0;
      right: 0;
      border-left: none;
      border-top: none;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin: 30px 0;
    }

    button {
      flex: 1;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #start {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    #start:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    #start:active:not(:disabled) {
      transform: translateY(0);
    }

    #start:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #stop {
      background: #f5f5f5;
      color: #666;
      border: 2px solid #e0e0e0;
    }

    #stop:hover:not(:disabled) {
      background: #efefef;
      border-color: #d0d0d0;
    }

    #stop:active:not(:disabled) {
      background: #e5e5e5;
    }

    #stop:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #result {
      padding: 16px;
      border-radius: 10px;
      min-height: 50px;
      text-align: center;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 15px;
      margin-top: 20px;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    #result.status-idle {
      background: #f8f9fa;
      color: #999;
      border: 1px solid #e0e0e0;
    }

    #result.status-loading {
      background: #e3f2fd;
      color: #1976d2;
      border: 1px solid #90caf9;
    }

    #result.status-success {
      background: #e8f5e9;
      color: #388e3c;
      border: 1px solid #81c784;
    }

    #result.status-error {
      background: #ffebee;
      color: #d32f2f;
      border: 1px solid #ef5350;
    }

    #result.status-warning {
      background: #fff3e0;
      color: #f57c00;
      border: 1px solid #ffb74d;
    }

    .icon {
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎥 QR Scanner</h1>
      <p>Attendance Check-in</p>
    </div>
    
    <div class="scanner-wrapper">
      <video id="preview"></video>
      <div class="scanner-frame" id="scannerFrame">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
      </div>
    </div>

    <div class="button-group">
      <button id="start">
        <span class="icon">▶</span>
        Start Scanner
      </button>
      <button id="stop">
        <span class="icon">⏹</span>
        Stop Scanner
      </button>
    </div>

    <div id="result" class="status-idle">
      Ready to scan
    </div>
  </div>
  
  <script type="module">
    import QrScanner from '{% static "qr-scanner.min.js" %}';
    
    let qrScanner = null;
    let isScanning = false;
    let lastScanTime = 0;
    const SCAN_COOLDOWN = 3000; // 3 second cooldown between scans
    
    // Get CSRF token
    function getCsrfToken() {
      let token = '';
      // Try to get from cookie
      const cookies = document.cookie.split(';');
      for (let cookie of cookies) {
        cookie = cookie.trim();
        if (cookie.startsWith('csrftoken=')) {
          token = cookie.substring('csrftoken='.length);
          break;
        }
      }
      console.log('CSRF Token:', token ? 'Found' : 'Not found');
      return token;
    }
    
    async function recordTime(qrCode) {
      try {
        console.log('Recording time for QR code:', qrCode);
        
        const csrfToken = getCsrfToken();
        const response = await fetch('/api/record-time/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
          },
          body: JSON.stringify({ qr_code: qrCode })
        });
        
        console.log('Response status:', response.status);
        const data = await response.json();
        console.log('Response data:', data);
        
        if (response.ok && data.success) {
          return { success: true, message: data.message };
        } else {
          return { success: false, message: data.error || 'Unknown error' };
        }
      } catch (error) {
        console.error('Error recording time:', error);
        return { success: false, message: error.message };
      }
    }

    function updateResultDisplay(message, status = 'idle', icon = '•') {
      const resultDiv = document.getElementById('result');
      resultDiv.className = `status-${status}`;
      resultDiv.innerHTML = `<span class="icon">${icon}</span>${message}`;
    }
    
    async function setupScannerButtons() {
      const startBtn = document.getElementById('start');
      const stopBtn = document.getElementById('stop');
      const videoElement = document.getElementById('preview');
      const scannerFrame = document.getElementById('scannerFrame');
      
      startBtn.onclick = async () => {
        try {
          console.log('Start button clicked');
          
          if (qrScanner && isScanning) {
            updateResultDisplay('Scanner already running', 'warning', '⚠️');
            return;
          }
          
          if (!qrScanner) {
            console.log('Creating QrScanner instance...');
            updateResultDisplay('Initializing scanner...', 'loading', '⏳');
            
            qrScanner = new QrScanner(
              videoElement,
              async result => {
                const now = Date.now();
                
                // Check if enough time has passed since last scan
                if (now - lastScanTime < SCAN_COOLDOWN) {
                  console.log('Scan ignored - still in cooldown period');
                  return;
                }
                
                if (!isScanning) return;
                console.log('QR code scanned:', result.data);
                lastScanTime = now;
                
                // Pause scanning temporarily
                qrScanner.pause();
                
                updateResultDisplay('Recording time...', 'loading', '⏳');
                const response = await recordTime(result.data);
                
                if (response.success) {
                  updateResultDisplay(response.message, 'success', '✓');
                } else {
                  updateResultDisplay('Error: ' + response.message, 'error', '❌');
                }
                
                // Resume scanning after cooldown
                setTimeout(() => {
                  if (isScanning && qrScanner) {
                    qrScanner.start().catch(e => console.error('Error resuming scanner:', e));
                    updateResultDisplay('Point camera at QR code', 'idle', '🎥');
                  }
                }, SCAN_COOLDOWN);
              },
              {
                preferredCamera: 'environment',
                highlightScanRegion: true,
                highlightCodeOutline: true,
                maxScansPerSecond: 25,
                calculateScanRegion: (video) => {
                  // Use full video frame for scanning instead of limited region
                  return {
                    x: 0,
                    y: 0,
                    width: video.videoWidth,
                    height: video.videoHeight
                  };
                }
              }
            );
          }
          
          console.log('Starting scanner...');
          isScanning = true;
          lastScanTime = 0;
          await qrScanner.start();
          scannerFrame.classList.add('active');
          updateResultDisplay('Point camera at QR code', 'idle', '🎥');
          startBtn.disabled = true;
          stopBtn.disabled = false;
          console.log('Scanner started successfully');
          
        } catch (error) {
          console.error('Error starting scanner:', error);
          console.error('Error details:', {
            message: error?.message,
            name: error?.name,
            stack: error?.stack
          });
          updateResultDisplay('Error: ' + (error?.message || String(error)), 'error', '❌');
          isScanning = false;
          if (qrScanner) {
            try {
              qrScanner.destroy();
            } catch (e) {
              console.error('Error destroying scanner:', e);
            }
            qrScanner = null;
          }
          startBtn.disabled = false;
          stopBtn.disabled = true;
        }
      };
      
      stopBtn.onclick = () => {
        try {
          console.log('Stop button clicked');
          if (qrScanner) {
            qrScanner.stop();
            isScanning = false;
            lastScanTime = 0;
            scannerFrame.classList.remove('active');
            updateResultDisplay('Scanner stopped', 'idle', '⏹');
            startBtn.disabled = false;
            stopBtn.disabled = true;
            console.log('Scanner stopped');
          } else {
            updateResultDisplay('Scanner is not running', 'warning', '⚠️');
          }
        } catch (error) {
          console.error('Error stopping scanner:', error);
          updateResultDisplay('Error stopping: ' + error.message, 'error', '❌');
          isScanning = false;
          startBtn.disabled = false;
          stopBtn.disabled = true;
        }
      };

      // Set initial button states
      stopBtn.disabled = true;
      
      console.log('Scanner buttons initialized');
    }
    
    // Wait for DOM to load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', async () => {
        console.log('DOMContentLoaded event fired');
        await setupScannerButtons();
      });
    } else {
      console.log('DOM already loaded, setting up now');
      await setupScannerButtons();
    }
  </script>
</body>
</html>
