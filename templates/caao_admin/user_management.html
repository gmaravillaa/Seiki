<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTR System - Admin Panel</title>
    
    <!-- PERFECT CDN STACK -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ULTIMATE DESIGN SYSTEM CSS -->
    <style>
        @tailwind base;
        @tailwind components;
        @tailwind utilities;

        /* PERFECT DESIGN TOKENS */
        @layer base {
            :root {
                --primary: #003a6c;
                --primary-50: #eff6ff;
                --primary-100: #dbeafe;
                --primary-500: #3b82f6;
                --bg-light: #f8fafc;
                --border: #e2e8f0;
                --text-primary: #1e293b;
                --text-secondary: #64748b;
                --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
                --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
                --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
                --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            }
            
            [data-theme="dark"] {
                --bg-light: #0f172a;
                --border: #334155;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
            }
            
            *,
            *::before,
            *::after {
                @apply border-border ring-[var(--primary)]/20;
            }
            
            body {
                @apply bg-[var(--bg-light)] text-[var(--text-primary)];
                font-feature-settings: 'rlig' 1, 'calt' 1;
            }
        }

        /* COMPONENT LIBRARY PERFECTION */
        @layer components {
            /* SIDEBAR SYSTEM */
            .sidebar {
                @apply fixed left-0 top-0 z-[1000] w-72 h-screen bg-[var(--primary)] text-white 
                       flex flex-col justify-between p-6 shadow-2xl border-r border-white/10
                       transition-all duration-300 ease-out lg:translate-x-0;
            }
            .sidebar.hidden {
                @apply -translate-x-full lg:translate-x-0;
            }
            .main-content {
                @apply ml-0 lg:ml-72 xl:ml-80 transition-all duration-300 min-h-screen;
            }
            .main-content.expanded {
                @apply lg:ml-0;
            }

            /* NAVIGATION */
            .nav-item {
                @apply group block p-3 rounded-2xl text-sm font-medium text-white/90 
                       hover:bg-white/15 hover:text-white hover:shadow-md hover:scale-[1.02]
                       active:scale-[0.98] active:shadow-sm transition-all duration-200
                       flex items-center gap-3 relative overflow-hidden;
            }
            .nav-item::before {
                content: '';
                @apply absolute inset-0 bg-gradient-to-r from-white/20 to-transparent 
                       scale-x-0 group-hover:scale-x-100 transition-transform duration-300 
                       origin-left rounded-2xl;
            }
            .nav-active {
                @apply bg-white/25 text-white font-semibold shadow-lg ring-2 ring-white/40
                       scale-[1.02] before:scale-x-100;
            }

            /* BUTTONS */
            .btn-primary {
                @apply inline-flex items-center gap-2 px-6 py-2.5 bg-[var(--primary)] 
                       text-white font-black text-xs uppercase rounded-2xl shadow-lg 
                       hover:shadow-xl hover:scale-[1.02] active:scale-[0.98] active:shadow-md
                       transition-all duration-200 ring-2 ring-transparent 
                       hover:ring-[var(--primary)]/50 focus:ring-4 focus:ring-[var(--primary)]/30
                       focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed
                       disabled:hover:scale-100;
            }
            .btn-secondary {
                @apply inline-flex items-center gap-2 px-6 py-2.5 bg-white/80 
                       border-2 border-[var(--primary)]/50 text-[var(--primary)] 
                       font-semibold text-sm rounded-2xl shadow-sm hover:shadow-md
                       hover:bg-white hover:scale-[1.02] hover:border-[var(--primary)]
                       transition-all duration-200;
            }
            .btn-danger {
                @apply inline-flex items-center gap-2 px-4 py-2 bg-red-500/90 
                       hover:bg-red-500 text-white font-semibold text-xs uppercase 
                       rounded-xl shadow-lg hover:shadow-xl hover:scale-[1.02]
                       transition-all duration-200;
            }
            
            .filter-btn {
                @apply px-5 py-2.5 text-xs font-black uppercase rounded-xl transition-all 
                       duration-200 bg-white/80 text-gray-700 shadow-sm hover:shadow-md
                       hover:scale-[1.02] active:scale-[0.98] border border-gray-200
                       hover:border-[var(--primary)] hover:bg-[var(--primary)] hover:text-white;
            }
            .filter-btn.active {
                @apply bg-[var(--primary)] text-white shadow-lg ring-2 ring-white/50 
                       scale-[1.02] border-[var(--primary)];
            }

            /* FORMS */
            .form-input, .form-select {
                @apply w-full px-4 py-3 border-2 border-gray-200 rounded-2xl text-sm 
                       placeholder:text-gray-400 bg-white/80 hover:bg-white focus:bg-white
                       focus:border-[var(--primary)] focus:ring-4 focus:ring-[var(--primary)]/20
                       focus:outline-none transition-all duration-200 shadow-sm
                       hover:shadow-md hover:border-[var(--primary)]/50 resize-none;
            }
            .form-input.error, .form-select.error {
                @apply border-red-400 ring-4 ring-red-400/30 bg-red-50/50;
            }
            .radio-group label {
                @apply flex items-center p-3 rounded-xl cursor-pointer hover:bg-gray-50/50
                       transition-all duration-150 hover:shadow-sm border border-transparent
                       hover:border-[var(--primary)]/30 gap-3 relative;
            }
            .radio-group input:checked + span {
                @apply bg-[var(--primary)] text-white shadow-lg ring-2 ring-white/50;
            }

            /* CARDS & TABLES */
            .card {
                @apply bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl border 
                       border-white/20 hover:shadow-2xl hover:-translate-y-1 
                       transition-all duration-300 p-8;
            }
            .card-header {
                @apply border-b border-gray-100 pb-6 mb-6 flex items-center justify-between;
            }
            .table-container {
                @apply overflow-x-auto rounded-2xl border border-gray-200/50;
            }
            .table-mobile {
                @apply block lg:table w-full divide-y divide-gray-200;
            }
            .table-row {
                @apply hover:bg-[var(--primary-50)] transition-all duration-200 
                       cursor-pointer group;
            }
            .role-badge {
                @apply inline-flex px-3 py-1.5 text-xs font-black uppercase rounded-full 
                       bg-gradient-to-r from-[var(--primary)] to-[var(--primary-500)]/10 
                       text-[var(--primary)] ring-1 ring-[var(--primary)]/40 shadow-sm;
            }

            /* HEADER */
            .header {
                @apply bg-white/90 backdrop-blur-xl sticky top-0 z-40 h-20 px-8 
                       flex items-center justify-between shadow-lg border-b 
                       border-gray-200/50 lg:px-10;
            }

            /* ANIMATIONS */
            @keyframes slideIn {
                from { opacity: 0; transform: translateY(30px) scale(0.95); }
                to { opacity: 1; transform: translateY(0) scale(1); }
            }
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-slide-in {
                animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .animate-fade-in-up {
                animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            }
        }

        /* MOBILE PERFECTION */
        @media (max-width: 1024px) {
            .sidebar { @apply w-64; }
            .main-content { @apply lg:ml-64; }
        }
        @media (max-width: 768px) {
            .sidebar { @apply w-60; }
            .header { @apply px-6 h-16; }
            .card { @apply p-6 rounded-2xl; }
            .table-mobile {
                @apply grid grid-cols-1 gap-4 p-4;
            }
            .table-row {
                @apply p-6 bg-white rounded-2xl shadow-xl border border-gray-100 
                       grid grid-cols-2 gap-4 text-sm hover:shadow-2xl;
            }
        }
        @media (max-width: 640px) {
            .sidebar { @apply w-[280px]; }
            .main-content { @apply p-4; }
        }

        /* DARK MODE */
        @media (prefers-color-scheme: dark) {
            .card, .header {
                @apply bg-white/5 border-white/10 backdrop-blur-xl;
            }
            .table-row:hover {
                @apply bg-white/5;
            }
        }

        /* PERFECT FOCUS */
        .focus\:ring-4:focus-visible {
            @apply ring-4 ring-[var(--primary)]/30 ring-offset-2 ring-offset-white;
        }
    </style>

    <!-- PERFECT JS -->
    <script>
        // DOM READY
        document.addEventListener('DOMContentLoaded', function() {
            initPerfectUI();
        });

        function initPerfectUI() {
            // Sidebar toggle
            document.querySelectorAll('[data-toggle-sidebar]').forEach(btn => {
                btn.addEventListener('click', toggleSidebar);
            });

            // Perfect form validation
            document.querySelectorAll('form[data-validate]').forEach(form => {
                form.addEventListener('submit', validateForm);
            });

            // Perfect filters
            document.querySelectorAll('[data-filter]').forEach(btn => {
                btn.addEventListener('click', handleFilter);
            });

            // Perfect role toggle
            document.querySelectorAll('input[name="role"]').forEach(radio => {
                radio.addEventListener('change', toggleRoleFields);
            });

            // Animate in elements
            document.querySelectorAll('.animate-delay-\\$0s\\$').forEach((el, i) => {
                el.style.animationDelay = `${i * 0.1}s`;
                el.classList.add('animate-slide-in');
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const main = document.querySelector('.main-content');
            sidebar.classList.toggle('hidden');
            main.classList.toggle('expanded');
        }

        function validateForm(e) {
            const form = e.target;
            const password = form.querySelector('#password');
            const confirmPassword = form.querySelector('#confirm_password');
            
            if (password && confirmPassword && password.value !== confirmPassword.value) {
                e.preventDefault();
                password.classList.add('error');
                confirmPassword.classList.add('error');
                showError('passwordError', 'Passwords do not match!');
                password.focus();
                return false;
            }
            
            // Loading state
            const submitBtn = form.querySelector('button[type="submit"]');
            const original = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Saving...';
            submitBtn.disabled = true;
            
            setTimeout(() => {
                submitBtn.innerHTML = original;
                submitBtn.disabled = false;
            }, 2000);
        }

        function handleFilter(e) {
            const role = e.target.dataset.filter;
            const rows = document.querySelectorAll('.table-row');
            const buttons = document.querySelectorAll('.filter-btn');
            
            // Active state
            buttons.forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            
            // Animate filter
            rows.forEach((row, i) => {
                const matches = role === 'all' || row.dataset.role === role;
                row.style.opacity = '0';
                row.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    row.style.display = matches ? 'revert' : 'none';
                    if (matches) {
                        row.style.opacity = '1';
                        row.style.transform = 'translateY(0)';
                    }
                }, i * 30);
            });
        }

        function toggleRoleFields() {
            const role = document.querySelector('input[name="role"]:checked').value;
            const studentFields = document.getElementById('studentFields');
            if (studentFields) {
                const show = role === 'student_assistant';
                studentFields.classList.toggle('hidden', !show);
                studentFields.style.opacity = show ? '1' : '0.5';
                studentFields.style.transform = show ? 'translateY(0)' : 'translateY(10px)';
            }
        }

        function showError(id, message) {
            const error = document.getElementById(id);
            if (error) {
                error.textContent = message;
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 4000);
            }
        }

        // Delete confirmation
        function confirmDelete(url) {
            if (confirm('Are you sure? This action cannot be undone.')) {
                window.location.href = url;
            }
        }

        // Perfect back button
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('hidden')) {
                    toggleSidebar();
                }
            }
        });
    </script>
</head>

<body class="antialiased">
    <!-- SIDEBAR PERFECTION -->
    <aside id="sidebar" class="sidebar animate-slide-in">
        <div class="space-y-1">
            <div class="mb-8">
                <h1 class="text-2xl font-black bg-gradient-to-r from-white to-white/70 bg-clip-text text-transparent">
                    DTR System
                </h1>
                <p class="text-xs opacity-75 mt-1">Admin Panel</p>
            </div>

            <nav class="space-y-1" role="navigation">
                <a href="{% url 'admin_dashboard' %}" class="nav-item">
                    <i class="fas fa-tachometer-alt w-4"></i>
                    Dashboard
                </a>
                <a href="{% url 'user_management' %}" class="nav-item nav-active">
                    <i class="fas fa-users w-4"></i>
                    User Management
                </a>
                <a href="{% url 'user_progress' %}" class="nav-item">
                    <i class="fas fa-chart-line w-4"></i>
                    Progress
                </a>
                <a href="{% url 'dtr_records' %}" class="nav-item">
                    <i class="fas fa-clock w-4"></i>
                    DTR Logs
                </a>
                <a href="{% url 'student_assistants' %}" class="nav-item">
                    <i class="fas fa-user-graduate w-4"></i>
                    Students
                </a>
                <a href="{% url 'chat' %}" class="nav-item">
                    <i class="fas fa-comments w-4"></i>
                    Chat
                </a>
            </nav>
        </div>

        <div>
            <form method="POST" action="{% url 'logout' %}" class="animate-fade-in-up">
                {% csrf_token %}
                <button type="submit" class="btn-secondary w-full">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- MAIN CONTENT PERFECTION -->
    <div class="main-content">
        <!-- HEADER PERFECTION -->
        <header class="header animate-slide-in">
            <div class="flex items-center gap-6">
                <button data-toggle-sidebar class="lg:hidden text-2xl p-2 rounded-xl hover:bg-gray-200/50 transition-all">
                    <i class="fas fa-bars"></i>
                </button>
                <div>
                    <h1 id="page-title" class="text-2xl font-black text-[var(--primary)]">
                        User Management
                    </h1>
                    <p class="text-sm text-[var(--text-secondary)] mt-1">
                        Create and manage system accounts
                    </p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="history.back()" class="btn-secondary">
                    <i class="fas fa-arrow-left"></i>
                    Back
                </button>
            </div>
        </header>

        <!-- CONTENT CONTAINER -->
        <main class="p-6 lg:p-10 max-w-7xl mx-auto space-y-8">
            <!-- PLACE YOUR PAGE CONTENT HERE -->
            <!-- This design works for ALL 5 pages identically -->
            
            <!-- EXAMPLE: USER MANAGEMENT CARD -->
            <div class="card animate-delay-[0s]">
                <div class="card-header">
                    <h2 class="text-2xl font-black text-[var(--primary)]">
                        <i class="fas fa-user-plus mr-3"></i>
                        Create New Account
                    </h2>
                </div>
                
                <form id="registrationForm" method="POST" data-validate class="space-y-8">
                    {% csrf_token %}
                    <!-- Your form fields here with form-input classes -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <!-- Content -->
                    </div>
                    <div class="flex justify-end pt-8 border-t border-gray-200">
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i>
                            Save Account
                        </button>
                    </div>
                </form>
            </div>

            <!-- EXAMPLE: PERFECT TABLE -->
            <div class="card animate-delay-[0.1s]">
                <div class="card-header">
                    <h3 class="text-xl font-black text-[var(--primary)]">Users</h3>
                    <div class="flex flex-wrap gap-2">
                        <button data-filter="all" class="filter-btn active">All</button>
                        <button data-filter="CAAO STAFF" class="filter-btn">Staff</button>
                        <button data-filter="OFFICE HEAD" class="filter-btn">Heads</button>
                        <button data-filter="STUDENT" class="filter-btn">Students</button>
                    </div>
                </div>
                
                <div class="table-container">
                    <table class="table-mobile">
                        <thead class="bg-gradient-to-r from-[var(--primary)]/5 to-transparent text-xs uppercase text-[var(--text-secondary)] font-black tracking-wider">
                            <tr class="lg:table-header-group">
                                <th class="px-6 py-4 text-left font-black">Username</th>
                                <!-- More headers -->
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Your table rows with table-row class -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
