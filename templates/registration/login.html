{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seiki - Login</title>
  <link rel="stylesheet" href="{% static 'student/styles.css' %}">
</head>
<body>
  <div class="login-container">
    <div class="login-wrapper">
      <div class="logo-container">
        <div class="logo-circle">
          <img src="{% static 'student/logo.png' %}" alt="Seiki Logo" style="max-width: 150%; height: auto;" />
        </div>
      </div>
      <h1 class="brand-name">
        <span class="brand-sei">Sei</span><span class="brand-ki">ki</span>
      </h1>
      <form method="post" class="login-form" action="{% url 'login' %}">
        {% csrf_token %}
        {% if form.non_field_errors %}
          <div class="error-message" style="display: flex; margin-bottom: 1rem; color: #b91c1c;">
            {% for error in form.non_field_errors %}
              <p>{{ error }}</p>
            {% endfor %}
          </div>
        {% endif %}
        <div class="form-group">
          <label class="form-label" for="id_username">Username</label>
          {{ form.username }}
        </div>
        <div class="form-group">
          <label class="form-label" for="id_password">Password</label>
          {{ form.password }}
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn-primary">Log In</button>
      </form>
      <p class="footer-text">Powered by Ateneo de Naga IS</p>
    </div>
  </div>
</body>
</html>
