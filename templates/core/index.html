<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seiki - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    /* Login Page */
    .login-page {
      min-height: 100vh;
      background-color: #003a6c;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-container {
      width: 100%;
      max-width: 28rem;
    }

    /* Logo */
    .logo-circle {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .logo-wrapper {
      position: relative;
      width: 6rem;
      height: 6rem;
      background-color: #d9d9d9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Brand Name */
    .brand-name {
      text-align: center;
      margin-bottom: 3rem;
    }

    .brand-sei {
      font-size: 3rem;
      font-weight: 800;
      color: #feacb5;
    }

    .brand-ki {
      font-size: 3rem;
      font-weight: 800;
      color: #94e2aa;
    }

    /* Form */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-label {
      color: white;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      opacity: 0.9;
    }

    .form-input {
      background-color: white;
      border-radius: 0.5rem;
      height: 3rem;
      border: 0;
      padding: 0 1rem;
      font-size: 1rem;
    }

    /* Checkbox */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .checkbox {
      background-color: #d9d9d9;
      border: 0;
      width: 1rem;
      height: 1rem;
      cursor: pointer;
    }

    .checkbox-label {
      color: white;
      font-size: 0.75rem;
      opacity: 0.9;
      cursor: pointer;
    }

    /* Buttons */
    .btn-login,
    .btn-gbox {
      width: 100%;
      background-color: #0059ff;
      color: white;
      border-radius: 0.5rem;
      height: 3rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
      font-size: 1rem;
    }

    .btn-login:hover,
    .btn-gbox:hover {
      background-color: #0046cc;
    }

    .btn-gbox {
      margin-top: 0.5rem;
    }

    /* Forgot Password Link */
    .forgot-password {
      display: block;
      text-align: center;
      color: #002bff;
      font-size: 0.875rem;
      text-decoration: underline;
      opacity: 0.9;
    }

    /* Footer */
    .footer-text {
      color: white;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 4rem;
      opacity: 0.9;
    }

    /* Responsive - Tablet/Desktop */
    @media (min-width: 768px) {
      .login-container {
        max-width: 32rem;
      }

      .logo-wrapper {
        width: 8rem;
        height: 8rem;
      }

      .brand-sei,
      .brand-ki {
        font-size: 3.75rem;
      }
    }

    @media (min-width: 1024px) {
      .brand-sei,
      .brand-ki {
        font-size: 4.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <!-- Logo Circle -->
      <div class="logo-circle">
        <div class="logo-wrapper"></div>
      </div>

      <!-- Brand Name -->
      <h1 class="brand-name">
        <span class="brand-sei">Sei</span><span class="brand-ki">ki</span>
      </h1>

      <!-- Error Message -->
      {% if error %}
      <div style="background-color: #ff6b6b; color: white; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; text-align: center;">
        {{ error }}
      </div>
      {% endif %}

      <!-- Login Form -->
      <form class="login-form" method="POST">
        {% csrf_token %}
        <!-- Username Field -->
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" name="username" required />
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" name="password" required />
        </div>

        <!-- Remember Me Checkbox -->
        <div class="checkbox-group">
          <input type="checkbox" id="remember" class="checkbox" name="remember" />
          <label for="remember" class="checkbox-label">Remember me</label>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn-login">Log In</button>

        <!-- Forgot Password Link -->
        <a href="#" class="forgot-password">Forgot your Password?</a>

        <!-- Gbox Login Button -->
        <button type="button" class="btn-gbox">Continue with gbox</button>
      </form>

      <!-- Footer -->
      <p class="footer-text">Powered by Ateneo de Naga IS</p>
    </div>
  </div>
</body>
</html>
