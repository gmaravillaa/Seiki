{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seiki - Login</title>
  <link rel="stylesheet" href="{% static 'student/styles.css' %}">
</head>
<body>
  <div class="login-container">
    <div class="login-wrapper">

      <!-- Logo -->
      <div class="logo-container">
        <div class="logo-circle">
          <img src="{% static 'student/logo.png' %}" alt="Seiki Logo" style="width: 180px; height: 180px;" />
        </div>
      </div>

      <!-- Brand Name -->
      <h1 class="brand-name">
        <span class="brand-sei">Sei</span><span class="brand-ki">ki</span>
      </h1>

      <!-- Django Error Message -->
      {% if form.non_field_errors %}
      <div class="error-message">
        <svg class="error-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <div class="error-text">
          {% for error in form.non_field_errors %}
            <p>{{ error }}</p>
          {% endfor %}
        </div>
      </div>
      {% endif %}

      <!-- LOGIN FORM (FIXED) -->
      <form method="post" action="{% url 'login' %}" class="login-form">
        {% csrf_token %}

        <!-- Username -->
        <div class="form-group">
          <label class="form-label">Username</label>
          <input 
            type="text" 
            name="username" 
            class="form-input"
            id="username"
            value="{{ form.username.value|default:'' }}"
            required
          >
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label">Password</label>
          <input 
            type="password" 
            name="password" 
            class="form-input"
            id="password"
            required
          >
        </div>

        <!-- Remember Me -->
        <div class="checkbox-group">
          <input type="checkbox" name="remember" id="remember" class="checkbox-input" />
          <label for="remember" class="checkbox-label">Remember me</label>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary">Log In</button>

        <!-- Optional Links -->
        <a href="#" class="forgot-password">Forgot your Password?</a>
        <button type="button" class="btn-gbox">Continue with gbox</button>

      </form>

      <!-- Footer -->
      <p class="footer-text">Powered by Ateneo de Naga IS</p>
    </div>
  </div>
</body>
</html>
