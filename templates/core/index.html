{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seiki - Login</title>
  <link rel="stylesheet" href="{% static 'student/styles.css' %}">
</head>
<body>
  <div class="login-container">
    <div class="login-wrapper">
      <!-- Logo -->
      <div class="logo-container">
        <div class="logo-circle">
          <img src="{% static 'student/logo.png' %}" alt="Seiki Logo" style="width: 160px; height: 160px;" />
        </div>
      </div>

      <!-- Brand Name -->
      <h1 class="brand-name">
        <span class="brand-sei">Sei</span><span class="brand-ki">ki</span>
      </h1>

      <!-- Error Message -->
      {% if error %}
      <div class="error-message">
        <svg class="error-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <p class="error-text">{{ error }}</p>
      </div>
      {% endif %}

      <!-- Login Form -->
      <form class="login-form" id="loginForm">
        <!-- Username Field -->
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="username" />
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" />
        </div>

        <!-- Remember Me Checkbox -->
        <div class="checkbox-group">
          <input type="checkbox" id="remember" class="checkbox-input" />
          <label for="remember" class="checkbox-label">Remember me</label>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn-primary">Log In</button>

        <!-- Forgot Password Link -->
        <a href="#" class="forgot-password">Forgot your Password?</a>

        <!-- Gbox Login Button -->
        <button type="button" class="btn-gbox">Continue with gbox</button>
      </form>

      <!-- Footer -->
      <p class="footer-text">Powered by Ateneo de Naga IS</p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.innerHTML = `
          <svg class="error-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <p class="error-text">Please enter both username and password</p>
        `;
        document.getElementById('loginForm').parentElement.insertBefore(errorDiv, document.getElementById('loginForm'));
      } else {
        // Redirect to student dashboard
        window.location.href = '{% url 'student_dashboard' %}';
      }
    });
  </script>
</body>
</html>
