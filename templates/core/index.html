{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seiki - Login</title>
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <!-- Logo Circle -->
      <div class="logo-circle">
        <div class="logo-wrapper"></div>
      </div>

      <!-- Brand Name -->
      <h1 class="brand-name">
        <span class="brand-sei">Sei</span><span class="brand-ki">ki</span>
      </h1>

      <!-- Error Message -->
      {% if error %}
      <div style="background-color: #ff6b6b; color: white; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; text-align: center;">
        {{ error }}
      </div>
      {% endif %}

      <!-- Login Form -->
      <form class="login-form" method="POST">
        {% csrf_token %}
        <!-- Username Field -->
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" name="username" required />
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" name="password" required />
        </div>

        <!-- Remember Me Checkbox -->
        <div class="checkbox-group">
          <input type="checkbox" id="remember" class="checkbox" name="remember" />
          <label for="remember" class="checkbox-label">Remember me</label>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn-login">Log In</button>

        <!-- Forgot Password Link -->
        <a href="#" class="forgot-password">Forgot your Password?</a>

        <!-- Gbox Login Button -->
        <button type="button" class="btn-gbox">Continue with gbox</button>
      </form>

      <!-- Footer -->
      <p class="footer-text">Powered by Ateneo de Naga IS</p>
    </div>
  </div>
</body>
</html>
